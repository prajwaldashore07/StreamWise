<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StreamWise - Stylish Mood-Based Recommendations</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
    :root {
      --bg-color: #0f172a;
      --text-color: #f8fafc;
      --card-bg: #1e293b;
      --btn-gradient: linear-gradient(45deg, #7f00ff, #00b7ff);
      --btn-hover-bg: #0096ff;
      --input-bg: #334155;
      --input-border: #475569;
      --shadow-light: rgba(127,0,255,0.3);
      --shadow-dark: rgba(0,0,0,0.6);
    }
    body {
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    header {
      width: 100%;
      max-width: 1440px;
      background: var(--card-bg);
      color: var(--text-color);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 40px;
      position: relative;
      box-shadow: 0 2px 10px var(--shadow-dark);
      user-select: none;
    }
    header .logo {
      position: absolute;
      left: 30px;
      font-weight: 700;
      font-size: 1.4rem;
      background: var(--btn-gradient);
      padding: 8px 16px;
      border-radius: 10px;
      box-shadow: 0 4px 15px var(--shadow-light);
      color: #fff;
      user-select: text;
    }
    header .title-container {
      text-align: center;
    }
    header .title-container h1 {
      margin: 0;
      font-weight: 700;
      font-size: 2.5rem;
      letter-spacing: 2px;
    }
    header .title-container p {
      margin: 6px 0 0 0;
      font-weight: 400;
      font-size: 1.15rem;
      color: var(--text-color);
      opacity: 0.8;
    }

    main.container {
      max-width: 900px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 10px 30px var(--shadow-dark);
      padding: 30px 40px 50px;
      margin: 30px 0 60px;
      box-sizing: border-box;
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 30px 40px;
      margin-bottom: 40px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      user-select: none;
      font-size: 1rem;
    }
    select, input[type=range] {
      width: 100%;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-color);
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.3s ease;
    }
    select:focus, input[type=range]:focus {
      outline: none;
      border-color: var(--btn-hover-bg);
      box-shadow: 0 0 6px var(--btn-hover-bg);
    }
    input[type=range] {
      height: 8px;
      background: var(--input-bg);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: var(--btn-gradient);
      border-radius: 50%;
      cursor: pointer;
      margin-top: -7px;
      transition: background-color 0.3s ease;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      background: var(--btn-hover-bg);
    }
    
    input[type=range]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: var(--btn-gradient);
      border-radius: 50%;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    input[type=range]::-moz-range-thumb:hover {
      background: var(--btn-hover-bg);
    }
    .range-label {
      margin-top: 8px;
      font-weight: 600;
      font-size: 1rem;
      user-select: none;
    }
    .buttons-row {
      display: flex;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    button.action-btn {
      flex: 1 1 200px;
      background: var(--btn-gradient);
      border: none;
      padding: 16px 0;
      font-size: 1.25rem;
      font-weight: 700;
      border-radius: 18px;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 12px 25px var(--shadow-light);
      transition: background-color 0.3s ease, transform 0.2s ease;
      user-select: none;
      text-align: center;
      min-width: 200px;
    }
    button.action-btn:hover {
      background: var(--btn-hover-bg);
      transform: scale(1.07);
      box-shadow: 0 18px 35px var(--btn-hover-bg);
    }
    button.action-btn:focus {
      outline: none;
      box-shadow: 0 0 10px 3px var(--btn-hover-bg);
    }

    .recommendations, .watchlist {
      margin-top: 50px;
    }
    .recommendations h3, .watchlist h3 {
      font-weight: 700;
      font-size: 2rem;
      margin-bottom: 25px;
      border-bottom: 2px solid var(--btn-hover-bg);
      padding-bottom: 8px;
      user-select: none;
    }
    #recommendationList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 30px;
    }

    /* Card styles without flip */
    .card {
      width: 230px;
      border-radius: 18px;
      box-shadow: 0 6px 20px var(--shadow-dark);
      background: var(--input-bg);
      user-select: none;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      cursor: default;
    }
    .card:hover {
      box-shadow: 0 15px 40px var(--btn-hover-bg);
      transform: translateY(-8px);
    }
    .poster {
      background-size: cover;
      background-position: center;
      height: 320px;
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
    }
    .info {
      padding: 15px 20px 20px;
      flex-grow: 1;
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      user-select: text;
    }
    .info h4 {
      margin: 0 0 10px 0;
      font-weight: 700;
      font-size: 1.4rem;
      line-height: 1.25;
    }
    .info p {
      margin: 6px 0;
      font-weight: 500;
      font-size: 1rem;
      opacity: 0.85;
    }
    .info button {
      margin-top: 12px;
      background: var(--btn-hover-bg);
      border: none;
      padding: 10px 0;
      font-weight: 700;
      font-size: 1.05rem;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      box-shadow: none;
      transition: background-color 0.3s ease;
      user-select: none;
    }
    .info button:hover {
      background: var(--btn-gradient);
    }

    .info .toggle-overview-btn {
      margin-top: 10px;
      background: transparent;
      border: 2px solid var(--btn-gradient);
      color: var(--btn-gradient);
      font-weight: 600;
      cursor: pointer;
      border-radius: 14px;
      padding: 6px 8px;
      transition: background-color 0.3s ease, color 0.3s ease;
      user-select: none;
    }
    .info .toggle-overview-btn:hover {
      background: var(--btn-gradient);
      color: #fff;
    }

    .overview-text {
      font-size: 0.95rem;
      opacity: 0.9;
      color: var(--text-color);
      user-select: text;
      line-height: 1.3;
      margin-top: 10px;
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid var(--input-border);
      padding-top: 10px;
      display: none;
    }

    .watchlist ul {
      list-style: inside disc;
      padding-left: 0;
      font-size: 1.2rem;
      user-select: text;
      color: var(--text-color);
    }
    .watchlist ul li {
      margin-bottom: 14px;
      font-weight: 700;
    }

    /* Responsive */
    @media (max-width: 640px) {
      header {
        padding: 15px 20px;
      }
      header .logo {
        left: 15px;
        font-size: 1.1rem;
        padding: 6px 12px;
      }
      header .title-container h1 {
        font-size: 2rem;
      }
      header .title-container p {
        font-size: 1rem;
      }
      main.container {
        padding: 25px 20px 40px;
        margin: 20px 10px 50px;
      }
      .filters {
        grid-template-columns: 1fr;
        gap: 25px;
      }
      .buttons-row {
        flex-direction: column;
      }
      button.action-btn {
        width: 100%;
        min-width: unset;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🎬 StreamWise</div>

  <div class="title-container">
    <h1>StreamWise</h1>
    <p>Because vibes deserve the right flick.</p>
  </div>
</header>

<main class="container" role="main" aria-label="Movie recommendation filters and results">
  <div class="filters" aria-label="Movie filters">
    <div>
      <label for="mood">Select Mood:</label>
      <select id="mood" name="mood">
        <option value="">--Select Mood--</option>
        <option>Happy</option>
        <option>Chill</option>
        <option>Sad</option>
        <option>Motivated</option>
      </select>
    </div>

    <div>
      <label for="genre">Select Genre:</label>
      <select id="genre" name="genre">
        <option value="">--Select Genre--</option>
        <option>Action</option>
        <option>Comedy</option>
        <option>Drama</option>
        <option>Thriller</option>
        <option>Documentary</option>
      </select>
    </div>

    <div>
        <label for="country">Select Country:</label>
        <select id="country" name="country">
          <option value="">--Select Country--</option>
          <option value="US">USA</option>
          <option value="IN">India</option>
          <option value="GB">United Kingdom</option>
          <option value="FR">France</option>
          <option value="JP">Japan</option>
        </select>
      </div>
      
    <div>
        <label for="language">Select Language:</label>
        <select id="language" name="language">
          <option value="">--Select Language--</option>
          <option>English</option>
          <option>Hindi</option>
          <option>Korean</option>
          <option>Tamil</option>
          <option>Telugu</option>
          <option>Spanish</option>
          <option>French</option>
        </select>
        
    </div>

    <div style="grid-column: 1 / -1;">
      <label for="ratingRange" class="range-label">Minimum IMDb Rating: <span id="ratingValue">5</span></label>
      <input type="range" id="ratingRange" name="ratingRange" min="0" max="10" step="0.1" value="5" />
    </div>
  </div>

  <div class="buttons-row">
    <button id="resetFilters" class="action-btn" title="Reset Filters">Reset Filters 🔄</button>
    <button id="btnRecommend" class="action-btn">Get Recommendations ▶️</button>
  </div>

  <section class="recommendations" aria-live="polite" aria-atomic="true" aria-label="Recommended movies and series">
    <h3>Recommended Movies/Series</h3>
    <div id="recommendationList" tabindex="0"></div>
  </section>

  <section class="watchlist" aria-live="polite" aria-atomic="true" aria-label="Your watchlist">
    <h3>Your Watchlist</h3>
    <ul id="watchlistItems" tabindex="0"></ul>
  </section>
</main>

<script>
  const genreMap = {
    Action: 28,
    Comedy: 35,
    Drama: 18,
    Thriller: 53,
    Romance: 10749,
    Documentary: 99
  };
  const languageMap = {
    English: 'en',
    Hindi: 'hi',
    Korean: 'ko',
    Tamil: 'ta',
    Telugu: 'te',
    Spanish: 'es',
    French: 'fr'
  };

  let watchlist = [];
  
  const TMDB_API_KEY = 'd7d0579f82ce09ea6dfe7b54d1438395';

  const btnRecommend = document.getElementById('btnRecommend');
  const resetFiltersBtn = document.getElementById('resetFilters');
  const ratingRange = document.getElementById('ratingRange');
  const ratingValue = document.getElementById('ratingValue');

  btnRecommend.addEventListener('click', getRecommendations);
  resetFiltersBtn.addEventListener('click', resetFilters);
  ratingRange.addEventListener('input', () => {
    ratingValue.textContent = ratingRange.value;
  });

  async function fetchMoviesFromTMDB(filters = {}, page = 1) {
    const baseUrl = 'https://api.themoviedb.org/3/discover/movie';
    const url = new URL(baseUrl);

    url.searchParams.append('api_key', TMDB_API_KEY);
    url.searchParams.append('sort_by', 'popularity.desc');
    url.searchParams.append('page', page);  // <-- add this

    if (filters.language) url.searchParams.append('with_original_language', filters.language);
    if (filters.minRating) url.searchParams.append('vote_average.gte', filters.minRating);
    if (filters.genreId) url.searchParams.append('with_genres', filters.genreId);
    if (filters.country) url.searchParams.append('with_origin_country', filters.country);
    if (filters.minVoteCount) url.searchParams.append('vote_count.gte', filters.minVoteCount);

    try {
      const response = await fetch(url.toString());
      const data = await response.json();

      return data.results.map(movie => ({
        title: movie.title,
        country: filters.country || 'Various',
        rating: movie.vote_average,
        language: movie.original_language,
        mood: getMoodFromRating(movie.vote_average),
        genre: filters.genre || 'Varied',
        poster: movie.poster_path
          ? `https://image.tmdb.org/t/p/w500${movie.poster_path}`
          : 'https://via.placeholder.com/230x320?text=No+Image',
        overview: movie.overview
      }));

    } catch (error) {
      console.error('Error fetching from TMDB:', error);
      return [];
    }
  }

  function getMoodFromRating(rating) {
    if (rating >= 8) return 'Motivated';
    if (rating >= 7) return 'Happy';
    if (rating >= 6) return 'Chill';
    return 'Sad';
  }

  async function getRecommendations() {
    const mood = document.getElementById('mood').value;
    const genre = document.getElementById('genre').value;
    const country = document.getElementById('country').value;
    const language = document.getElementById('language').value;
    const minRating = parseFloat(ratingRange.value);

    const filters = {
      language: languageMap[language] || undefined,
      minRating: minRating || undefined,
      genreId: genreMap[genre] || undefined,
      genre: genre || undefined,
      minVoteCount: 50,
      country: country || undefined
    };

    let allMovies = [];
    const maxPagesToFetch = 5;

    for (let page = 1; page <= maxPagesToFetch; page++) {
      const movies = await fetchMoviesFromTMDB(filters, page);
      allMovies = allMovies.concat(movies);
    }

    const filtered = mood ? allMovies.filter(movie => movie.mood === mood) : allMovies;

    if (filtered.length === 0) {
      alert('No movies found matching your filters and mood. Please try different filters.');
      return;
    }

    displayRecommendations(filtered);
  }

  function displayRecommendations(movies) {
    const container = document.getElementById('recommendationList');
    container.innerHTML = '';

    movies.forEach(item => {
      const card = document.createElement('div');
      card.classList.add('card');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `${item.title} movie card`);

      card.innerHTML = `
        <div class="poster" style="background-image: url('${item.poster}');" role="img" aria-label="Poster of ${item.title}"></div>
        <div class="info">
          <h4>${item.title}</h4>
          <p><strong>Country:</strong> ${item.country}</p>
          <p><strong>Language:</strong> ${item.language}</p>
          <p><strong>Genre:</strong> ${item.genre}</p>
          <p><strong>IMDb Rating:</strong> ${item.rating}</p>
          <button class="watchlist-btn" aria-label="Add ${item.title} to watchlist">Add to Watchlist</button>
          <button class="toggle-overview-btn" aria-expanded="false" aria-controls="overview-${item.title.replace(/\s+/g, '')}">Show Overview</button>
          <p id="overview-${item.title.replace(/\s+/g, '')}" class="overview-text">${item.overview || 'No overview available.'}</p>
        </div>
      `;

      // Hide overview initially
      const overviewText = card.querySelector('.overview-text');
      overviewText.style.display = 'none';

      // Add event for watchlist button
      const watchlistBtn = card.querySelector('.watchlist-btn');
      watchlistBtn.addEventListener('click', () => addToWatchlist(item));

      // Add toggle event for overview
      const toggleBtn = card.querySelector('.toggle-overview-btn');
      toggleBtn.addEventListener('click', () => {
        const isVisible = overviewText.style.display === 'block';
        overviewText.style.display = isVisible ? 'none' : 'block';
        toggleBtn.textContent = isVisible ? 'Show Overview' : 'Hide Overview';
        toggleBtn.setAttribute('aria-expanded', !isVisible);
      });

      container.appendChild(card);
    });
  }

  function addToWatchlist(movie) {
    if (watchlist.some(m => m.title === movie.title)) {
      alert('This movie is already in your watchlist.');
      return;
    }
    watchlist.push(movie);
    updateWatchlistUI();
  }

  function updateWatchlistUI() {
    const watchlistContainer = document.getElementById('watchlistItems');
    watchlistContainer.innerHTML = '';

    watchlist.forEach(movie => {
      const li = document.createElement('li');
      li.textContent = movie.title;
      watchlistContainer.appendChild(li);
    });
  }

  function resetFilters() {
    document.getElementById('mood').value = '';
    document.getElementById('genre').value = '';
    document.getElementById('country').value = '';
    document.getElementById('language').value = '';
    ratingRange.value = 5;
    ratingValue.textContent = 5;
    document.getElementById('recommendationList').innerHTML = '';
  }
</script>

</body>
</html>
